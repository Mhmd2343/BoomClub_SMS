<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoomClub - Michel Abboud</title>

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/filter-by-month.css" />
  <link rel="stylesheet" href="assets/css/filter-by-date.css" />
  <link rel="stylesheet" href="assets/css/history.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2>BoomClub</h2>
        <p>Dashboard</p>
      </div>

      <nav class="sidebar-menu">
        <button class="sidebar-btn active" data-page="dashboard">
          Dashboard
        </button>

        <button class="sidebar-btn" data-page="filter-by-month">
          Filter by Month
        </button>

        <button class="sidebar-btn" data-page="filter-by-date">
          Filter by Date
        </button>

        <button class="sidebar-btn" data-page="history">
          History
        </button>
      </nav>
    </aside>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <main class="main-content">
      <button id="mobileMenuToggle" class="mobile-menu-toggle" aria-label="Open menu">
        ☰
      </button>

      <div id="pageContent"></div>
    </main>
  </div>

  <!-- GLOBAL FILE PREVIEW MODAL -->
  <div id="filePreviewModal" class="file-preview-modal">
    <div class="file-preview-backdrop" id="filePreviewBackdrop"></div>

    <div class="file-preview-dialog">
      <div class="file-preview-header">
        <div>
          <h2 id="filePreviewTitle">File Preview</h2>
          <p id="filePreviewSubtitle">Selected Excel file</p>
        </div>

        <button id="closeFilePreviewBtn" class="close-preview-btn" type="button">
          ✕
        </button>
      </div>

      <div id="filePreviewBody" class="file-preview-body">
        <p>No preview available.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
