<section class="page-section">
  <div class="container">
    <div class="filter-header">
      <div>
        <h1>BoomClub Birthday Filter</h1>
        <p>Upload Excel file(s) and group users by exact birth date.</p>
      </div>

      <button id="clearDatePageBtn" class="clear-page-btn" type="button">
        Reset Page
      </button>
    </div>

    <input
      type="file"
      id="dateExcelInput"
      accept=".xlsx,.xls"
      multiple
    />

    <div id="dateSelectedFiles"></div>

    <button id="processDateBtn" type="button">Process File</button>

    <button id="downloadDateBtn" type="button" disabled>
      Download XLSX File
    </button>

    <div id="dateSummaryBox"></div>
    <div id="dateResultList"></div>
  </div>
</section>
