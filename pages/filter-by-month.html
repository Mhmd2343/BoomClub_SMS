<section class="page-section">
  <div class="container">
    <div class="filter-header">
      <div>
        <h1>BoomClub Birthday Filter</h1>
        <p>Upload Excel file(s) and group users by birth month.</p>
      </div>

      <button id="clearPageBtn" class="clear-page-btn" type="button">
        Reset Page
      </button>
    </div>

    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple />
    <div id="selectedFileContainer"></div>

    <button id="processBtn" type="button">Process File</button>

    <div id="output"></div>
  </div>
</section>
