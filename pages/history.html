<section class="page-section">
  <div class="container">
    <div class="history-header">
      <div>
        <h1>History</h1>
        <p>Choose which history you want to view.</p>
      </div>

      <button id="clearHistoryBtn" class="clear-history-btn" type="button">
        Clear History
      </button>
    </div>

    <div id="historyHomeView" class="history-home-view">
      <button id="showMonthHistoryBtn" class="history-choice-btn" type="button">
        Filter by Month
      </button>

      <button id="showDateHistoryBtn" class="history-choice-btn" type="button">
        Filter by Date
      </button>

      <button id="showSendSmsHistoryBtn" class="history-choice-btn" type="button">
  Send SMS
</button>

    </div>

    <div id="monthHistoryView" class="history-detail-view hidden">
      <div class="history-section-header">
        <h2>Month History</h2>
        <button id="backToHistoryHomeFromMonth" class="back-history-btn" type="button">
          Back
        </button>
      </div>

      <p>Previously processed monthly Excel results.</p>
      <div id="historyMonthContent"></div>
    </div>

    <div id="dateHistoryView" class="history-detail-view hidden">
      <div class="history-section-header">
        <h2>Date History</h2>
        <button id="backToHistoryHomeFromDate" class="back-history-btn" type="button">
          Back
        </button>
      </div>

      <p>Previously processed exact-date Excel results.</p>
      <div id="historyDateContent"></div>
    </div>

    <div id="sendSmsHistoryView" class="history-detail-view hidden">
  <div class="history-section-header">
    <h2>Send SMS History</h2>
    <button id="backToHistoryHomeFromSendSms" class="back-history-btn" type="button">
      Back
    </button>
  </div>

  <p>Previously scheduled or sent SMS actions.</p>
  <div id="historySendSmsContent"></div>
</div>
  </div>
</section>
