<section class="page-section">

    <div class="history-header">
      <div>
        <h1>History</h1>
        <p>View previously processed files and exported results.</p>
      </div>

      <button id="clearHistoryBtn" class="clear-history-btn" type="button">
        Clear History
      </button>
    </div>

    <div class="history-section">
      <h2>Month History</h2>
      <p>Previously processed monthly Excel results.</p>
      <div id="historyMonthContent"></div>

      <h2>Date History</h2>

          <p>When you add the filter-by-date feature later, its history will appear here.</p>
        </div>
      </div>
    </div>
  </div>
</section>
